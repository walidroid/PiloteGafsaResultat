            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1max));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
        }

        .stat-card h3 {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 5px;
        }

        .stat-card p {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .controls {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }

        .search-box {
            flex: 2;
            min-width: 250px;
            position: relative;
        }

        .search-box input {
            width: 100px;
            width: 100%;
            padding: 12px 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            border-color: var(--secondary-color);
        }

        .filter-box {
            flex: 1;
            min-width: 200px;
        }

        .filter-box select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            background-color: white;
            cursor: pointer;
        }

        .table-container {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
        }

        th, td {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #f1f5f9;
            color: var(--primary-color);
            font-weight: 600;
            cursor: pointer;
            user-select: none;
        }

        th:hover {
            background-color: #e2e8f0;
        }

        tr:hover {
            background-color: #f8fafc;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            background-color: #d1fae5;
            color: #065f46;
        }

        .rank-badge {
            background-color: #e0f2fe;
            color: #0369a1;
        }

        @media (max-width: 768px) {
            th, td {
                padding: 10px 12px;
                font-size: 14px;
            }
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
        }

    const tableBody = document.getElementById('data-table-body');
    const searchInput = document.getElementById('search-input');
    const schoolFilter = document.getElementById('school-filter');
    const sortSelect = document.getElementById('sort-select');

    // تفعيل الإحصائيات العامة أولاً
    function initStats() {
        document.getElementById('total-students').textContent = studentsData.length;
        const scores = studentsData.map(s => s.score);
        document.getElementById('max-score').textContent = Math.max(...scores).toFixed(2);
        document.getElementById('min-score').textContent = Math.min(...scores).toFixed(2);
    }

    // تعبئة قائمة فلترة المدارس بدون تكرار
    function populateSchools() {
        const schools = [...new Set(studentsData.map(s => s.school))].sort();
        schools.forEach(school => {
            const option = document.createElement('option');
            option.value = school;
            option.textContent = school;
            schoolFilter.appendChild(option);
        });
    }

    // عرض وتحديث البيانات داخل الجدول
    function displayData(data) {
        tableBody.innerHTML = '';
        if (data.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#94a3b8;">لا توجد نتائج مطابقة للبحث...</td></tr>`;
            return;
        }

        data.forEach(student => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><span class="badge rank-badge">${student.rank}</span></td>
                <td><strong>${student.name}</strong></td>
                <td><span class="badge">${student.score.toFixed(2)}</span></td>
                <td>${student.school}</td>
                <td>${student.target}</td>
            `;
            tableBody.appendChild(row);
        });
    }

    // تصفية وترتيب البيانات بشكل ديناميكي
    function filterAndSortData() {
        const searchTerm = searchInput.value.trim().toLowerCase();
        const selectedSchool = schoolFilter.value;
        const sortBy = sortSelect.value;

        let filtered = studentsData.filter(student => {
            const matchesSearch = student.name.toLowerCase().includes(searchTerm) || 
                                  student.school.toLowerCase().includes(searchTerm);
            const matchesSchool = selectedSchool === '' || student.school === selectedSchool;
            return matchesSearch && matchesSchool;
        });

        // عمليات الترتيب والتنظيم
        if (sortBy === 'rank-asc') {
            filtered.sort((a, b) => a.rank - b.rank);
        } else if (sortBy === 'score-desc') {
            filtered.sort((a, b) => b.score - a.score);
        } else if (sortBy === 'name-asc') {
            filtered.sort((a, b) => a.name.localeCompare(b.name, 'ar'));
        }

        displayData(filtered);
    }

    // ربط الأحداث (Event Listeners) عناصر التحكم
    searchInput.addEventListener('input', filterAndSortData);
    schoolFilter.addEventListener('change', filterAndSortData);
    sortSelect.addEventListener('change', filterAndSortData);

    // تشغيل التطبيق عند التحميل
    initStats();
    populateSchools();
    displayData(studentsData);
</script>
